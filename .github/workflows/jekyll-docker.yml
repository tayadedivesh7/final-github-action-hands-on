name: Exercise 6 - Variables
on: workflow_dispatch
env:
  APP_NAME: MyDevOpsApp

jobs:
  my-jobs:
    runs-on: ubuntu-latest
    env:
      VERSION: 1.0.0
    steps:
      - name: Print variables
        run: |
          echo "App Name: $APP_NAME"
          echo "Version: $VERSION"
      - name: Step level variable
        run: | 
          echo "Build number: $BUILD_NUM"
        env:
          BUILD_NUM: 101
